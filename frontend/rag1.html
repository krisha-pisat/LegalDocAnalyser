<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Legal AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #ffffff;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated moving background */
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: linear-gradient(45deg, #0a0a0f 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #533483 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    .shape:nth-child(1) {
      width: 80px;
      height: 80px;
      left: 10%;
      animation-delay: 0s;
      animation-duration: 20s;
    }

    .shape:nth-child(2) {
      width: 120px;
      height: 120px;
      left: 20%;
      animation-delay: 2s;
      animation-duration: 25s;
    }

    .shape:nth-child(3) {
      width: 60px;
      height: 60px;
      left: 70%;
      animation-delay: 4s;
      animation-duration: 18s;
    }

    .shape:nth-child(4) {
      width: 100px;
      height: 100px;
      left: 80%;
      animation-delay: 6s;
      animation-duration: 22s;
    }

    .shape:nth-child(5) {
      width: 90px;
      height: 90px;
      left: 50%;
      animation-delay: 8s;
      animation-duration: 24s;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header - Removed styles for dynamic addition later */

    /* Main content */
    .main-content {
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      min-height: 100vh;
      position: relative;
      z-index: 1;
      justify-content: space-between;
    }

    .chat-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      max-height: 70vh;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.8s ease-out;
    }

    .chat-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .chat-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #64b5f6 50%, #42a5f5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .chat-subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .message-bubble {
      display: flex;
      margin-bottom: 1rem;
      animation: fadeIn 0.3s ease-out;
    }

    .message-bubble.user {
      justify-content: flex-end;
    }

    .message-bubble.ai {
      justify-content: flex-start;
    }

    .message-content {
      max-width: 75%;
      padding: 1rem 1.2rem;
      border-radius: 18px;
      font-size: 1rem;
      line-height: 1.5;
      position: relative;
    }

    .message-bubble.user .message-content {
      background: linear-gradient(135deg, #42a5f5 0%, #1976d2 100%);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(66, 165, 245, 0.3);
    }

    .message-bubble.ai .message-content {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      border-bottom-left-radius: 4px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    
    .chat-input-area {
      display: flex;
      gap: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-input {
      flex-grow: 1;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #ffffff;
      transition: all 0.3s ease;
      outline: none;
      resize: none;
      min-height: 50px;
      max-height: 150px;
      overflow-y: auto;
      font-family: inherit;
    }

    .chat-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .chat-input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(100, 181, 246, 0.6);
      box-shadow: 0 0 0 4px rgba(100, 181, 246, 0.1);
      transform: translateY(-2px);
    }

    .send-button {
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      background: linear-gradient(135deg, #4CAF50 0%, #81C784 100%);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3);
      position: relative;
      overflow: hidden;
      min-width: 100px;
    }

    .send-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
    }

    .send-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .send-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.6s;
    }

    .send-button:hover::before {
      left: 100%;
    }

    .loading-dots {
      display: inline-block;
      width: 30px;
      text-align: left;
      font-size: 1.5rem;
      margin-left: 10px;
      position: relative;
      top: -3px;
    }

    .loading-dots span {
      opacity: 0;
      animation: loading-fade 1.5s infinite;
    }

    .loading-dots span:nth-child(1) { animation-delay: 0s; }
    .loading-dots span:nth-child(2) { animation-delay: 0.5s; }
    .loading-dots span:nth-child(3) { animation-delay: 1s; }

    @keyframes loading-fade {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-content {
        padding: 1rem;
      }
      .chat-container {
        padding: 1rem;
      }
      .chat-title {
        font-size: 2rem;
      }
      .chat-subtitle {
        font-size: 1rem;
      }
      .chat-input-area {
        flex-direction: column;
        gap: 0.8rem;
      }
      .send-button {
        width: 100%;
        padding: 0.8rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="background-animation"></div>
  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

<div id="navbar-placeholder"></div>
 <script>
  fetch("nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("navbar-placeholder").innerHTML = html;

      // ⏬ Re-run script blocks inside nav.html
      const scripts = document
        .querySelector("#navbar-placeholder")
        .querySelectorAll("script");

      scripts.forEach(oldScript => {
        const newScript = document.createElement("script");
        if (oldScript.type) newScript.type = oldScript.type;
        if (oldScript.src) newScript.src = oldScript.src;
        else newScript.textContent = oldScript.textContent;
        document.body.appendChild(newScript);
        oldScript.remove();
      });
    });
</script>


  <!-- Main Content -->
  <main class="main-content">
    <div class="chat-container" id="chatContainer">
      <div class="chat-header">
        <h2 class="chat-title">Legal AI Assistant</h2>
        <p class="chat-subtitle">Ask me anything about legal matters and I'll help you understand</p>
      </div>
      
      <!-- Messages will be inserted here -->
    </div>

    <div class="chat-input-area">
      <textarea id="chatInput" class="chat-input" rows="1" placeholder="Type your legal question here..."></textarea>
      <button id="sendBtn" class="send-button" type="button">Send</button>
    </div>
  </main>

 

  <script>

    document.addEventListener('DOMContentLoaded', () => {
      const chatContainer = document.getElementById('chatContainer');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');

      function appendMessage(sender, text) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message-bubble', sender);
        
        const contentDiv = document.createElement('div');
        contentDiv.classList.add('message-content');
        contentDiv.textContent = text;
        
        messageDiv.appendChild(contentDiv);
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function showLoading(show) {
        sendBtn.disabled = show;
        if (show) {
          sendBtn.innerHTML = 'Sending<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';
        } else {
          sendBtn.textContent = 'Send';
        }
      }

      async function sendMessage() {
        const userMessage = chatInput.value.trim();
        if (!userMessage) return;

        console.log("🚀 Sending message:", userMessage);
        appendMessage('user', userMessage);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        showLoading(true);

        try {
          const res = await fetch('http://localhost:8000/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: userMessage })
          });

          console.log("✅ Fetch completed");
          const data = await res.json();
          appendMessage('ai', data.answer || 'No answer returned.');
        } catch (err) {
          console.error("❌ Fetch error:", err);
          appendMessage('ai', '⚠️ Error: Could not connect to the backend.');
        } finally {
          showLoading(false);
        }
      }

      sendBtn.addEventListener('click', (e) => {
        e.preventDefault();
        sendMessage();
      });

      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Auto-resize textarea
      chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
      });
    });
  </script>
</body>
</html>
